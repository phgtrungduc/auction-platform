<div class="page">
  <!-- Sidebar -->
  <aside class="page__sidebar">
    <h3 class="page__title ml-4">Danh Sách Tài Sản Đấu Giá</h3>
    <p class="page__subtitle ml-4">Tìm thấy 41 tài sản</p>
    <app-filter-sidebar></app-filter-sidebar>
  </aside>

  <!-- Content -->
  <section class="page__content">
    <!-- Top bar -->
    <div class="content__header">
      <input class="search search--text" placeholder="Nhập từ khóa cần tìm" />
      <!-- <select class="sort">
        <option>Mới nhất</option>
        <option>Giá tăng dần</option>
        <option>Giá giảm dần</option>
      </select> -->
      <div class="custom-select">
        <select>
          <option>Mới nhất</option>
          <option>Giá tăng dần</option>
          <option>Giá giảm dần</option>
        </select>
        <span class="select-arrow">
          <i class="fa fa-chevron-down"></i>
        </span>
      </div>
    </div>

    <!-- Product grid -->
    <div class="grid">

      <ng-container *ngFor="let item of products">

        <!-- Ads -->
        <div *ngIf="item.isAd" class="card ad">
          <span>Quảng cáo</span>
        </div>

        <!-- Product -->
        <div *ngIf="!item.isAd" class="card">

          <div class="card__image">
            <img [src]="item.image" />
            <span class="badge" [ngClass]="getStatusClass(item.status)">{{ item.status }}</span>
          </div>

          <div class="card__body">
            <h4>{{ item.title }}</h4>
            <p class="meta">{{ item.desc }}</p>

            <div class="price">
              <div class="price__bottom">
                <!-- SUCCESS -->
                <ng-container *ngIf="item.outcomeStatus === 'SUCCESS'; else normalPrice">
                  <span class="price--success">
                    <span class="label">Trúng</span><br />
                    <span class="value">{{ item.price }}</span>
                    <span class="increase">(+28%)</span>
                  </span>
                </ng-container>

                <!-- NORMAL / FAIL -->
                <ng-template #normalPrice>
                  <span [ngClass]="{'price--fail': item.outcomeStatus === 'FAIL'}">
                    {{ item.price }}
                  </span>
                </ng-template>
                <span class="sub" *ngIf="!item.startPrice">
                  khởi điểm
                </span>
              </div>


              <!-- start price -->
              <span class="sub-starting" *ngIf="item.startPrice">
                khởi điểm {{ item.startPrice }}
              </span>
            </div>

            <div class="footer">
              <div class="auction-card__owner">
                <span class="avatar">LV</span>
                <span class="org">Lạc Việt</span>
              </div>
              <button class="btn" (click)="navToDetail(item.id)">Chi tiết →</button>
            </div>
          </div>

        </div>

      </ng-container>

    </div>

    <section class="recommend-login">
      <svg class="recommend-login__icon" xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="8" y="6" width="10" height="14" rx="1" ry="1"></rect>
        <path d="M6 18H5a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1h9a1 1 0 0 1 1 1v2"></path>
        <line x1="10" y1="10" x2="16" y2="10"></line>
        <line x1="10" y1="13" x2="16" y2="13"></line>
        <line x1="10" y1="16" x2="14" y2="16"></line>
      </svg>
      <div class="recommend-login__text">Đăng ký/đăng nhập để tiếp tục xem</div>
      <button class="recommend-login__btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
          <polyline points="10 17 15 12 10 7"></polyline>
          <line x1="15" y1="12" x2="3" y2="12"></line>
        </svg>
        Đăng nhập / Đăng ký
      </button>
    </section>
  </section>

</div>
