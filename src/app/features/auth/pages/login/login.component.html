<div class="login-wrapper">
  <div class="login-card">
    <div class="login-card__header">
      <h1>Đăng nhập</h1>
      <p>Auction Platform</p>
    </div>

    <form class="login-card__form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Tên đăng nhập</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="Nhập tên đăng nhập"
          autocomplete="username"
        />
        @if (loginForm.get('username')?.invalid && loginForm.get('username')?.touched) {
          <span class="form-error">Vui lòng nhập tên đăng nhập.</span>
        }
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Nhập mật khẩu"
          autocomplete="current-password"
        />
        @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
          <span class="form-error">Mật khẩu tối thiểu 6 ký tự.</span>
        }
      </div>

      <button type="submit" class="btn-submit" [disabled]="loginForm.invalid || isLoading">
        {{ isLoading ? 'Đang đăng nhập...' : 'Đăng nhập' }}
      </button>
    </form>
  </div>
</div>
