<div class="suggest-notify__backdrop" *ngIf="isOpen" (click)="onLater()">
  <div class="suggest-notify__dialog" (click)="$event.stopPropagation()">
    <div class="suggest-notify__icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 16V11C18 7.686 15.314 5 12 5C8.686 5 6 7.686 6 11V16L4 18V19H20V18L18 16Z"
              stroke="#367639" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M10 21C10.5 21.6 11.2 22 12 22C12.8 22 13.5 21.6 14 21"
              stroke="#367639" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="12" cy="4" r="1" fill="#367639" />
      </svg>
    </div>

    <h3 class="suggest-notify__title">Nhận thông báo cập nhật</h3>
    <p class="suggest-notify__desc">
      Bật thông báo để nhận tin mới nhất về lịch đấu giá, giá khởi điểm và trạng thái phiên của tài sản bạn quan tâm
    </p>

    <button
      type="button"
      class="suggest-notify__btn suggest-notify__btn--primary"
      (click)="onConfirm()"
      [disabled]="isSubmitting"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M18 16V11C18 7.686 15.314 5 12 5C8.686 5 6 7.686 6 11V16L4 18V19H20V18L18 16Z"
              stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M10 21C10.5 21.6 11.2 22 12 22C12.8 22 13.5 21.6 14 21"
              stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      {{ isSubmitting ? 'Đang bật...' : 'Bật thông báo' }}
    </button>

    <button
      type="button"
      class="suggest-notify__btn suggest-notify__btn--ghost"
      (click)="onLater()"
      [disabled]="isSubmitting"
    >
      Để sau
    </button>
  </div>
</div>
