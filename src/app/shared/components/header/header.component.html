    <div class="header-actions">
      @if (headerUserVm$ | async; as vm) {
        @if (vm.type === 'user') {
          <div class="header-logged-in">
            <button type="button" class="btn-credit-promo">
              <i class="fa-solid fa-gift" aria-hidden="true"></i>
              <span>Nhận ngay 168 Credit</span>
            </button>

            <div class="credit-balance-pill" role="status">
              <i class="fa-solid fa-coins" aria-hidden="true"></i>
              <span>{{ creditBalance }} Credit</span>
            </div>

            <div class="user-bubble">
              <button type="button" class="user-profile-trigger" aria-haspopup="true" aria-expanded="false">
                <span class="user-avatar-ring">
                  <span class="user-avatar-initial">{{ vm.displayName | slice:0:1 | uppercase }}</span>
                </span>
                <i class="fa-solid fa-chevron-down user-profile-chevron" aria-hidden="true"></i>
              </button>

              <div class="user-dropdown" role="menu">
                <div class="user-dropdown-header">
                  <span class="user-dropdown-avatar">
                    <span class="user-avatar-initial user-avatar-initial--lg">{{ vm.displayName | slice:0:1 | uppercase }}</span>
                  </span>
                  <div class="user-dropdown-ident">
                    <div class="user-dropdown-name">{{ vm.displayName }}</div>
                    <div class="user-dropdown-email">{{ vm.email }}</div>
                  </div>
                </div>

                <div class="user-dropdown-section user-dropdown-credit-row">
                  <span class="user-dropdown-credit-label">Credit của tôi</span>
                  <span class="user-dropdown-credit-badge">
                    <i class="fa-solid fa-coins" aria-hidden="true"></i>
                    {{ creditBalance }} Credit
                  </span>
                </div>

                <div class="user-dropdown-section user-dropdown-links">
                  <button type="button" class="user-dropdown-item" role="menuitem" (click)="redirectToProfile()">

                </div>
